<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Assets Mapping & RPC Demo</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <h1>Local asset mapping &amp; RPC working!</h1>
        <p class="desc">This page was loaded entirely from the local <code>resources</code> folder, with no local HTTP server running.</p>

        <div class="card">
            <h3>RPC round-trip test</h3>
            <div class="input-group">
                <input type="text" id="rpcInput" value="Hello, C++!">
                <button id="sendRpcBtn">Send RPC to C++</button>
            </div>
            <div class="result-box">
                <strong>C++ reply:</strong>
                <span id="rpcResult">Waiting to send...</span>
            </div>
        </div>
    </div>

    <script src="./script.js"></script>
</body>
</html>
