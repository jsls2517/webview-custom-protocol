<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Assets Mapping & RPC Demo</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <h1>本地静态文件夹映射与 RPC 通信成功！</h1>
        <p class="desc">该页面完全加载自本地资源文件夹 <code>./resources</code>，未开启任何本地 HTTP 服务端口。</p>
        
        <div class="card">
            <h3>RPC 双向通信测试</h3>
            <div class="input-group">
                <input type="text" id="rpcInput" value="你好，C++！">
                <button id="sendRpcBtn">发送 RPC 到 C++</button>
            </div>
            <div class="result-box">
                <strong>C++ 返回值：</strong>
                <span id="rpcResult">等待发送...</span>
            </div>
        </div>
    </div>
    
    <script src="./script.js"></script>
</body>
</html>
